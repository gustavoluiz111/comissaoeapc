<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calendário de vendas da Comissão 3º Ano com escala mensal dos grupos.">
    <title>Calendário - Comissão 3º Ano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        /* Calendar Controls */
        .calendar-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            gap: 12px;
        }

        .calendar-controls h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-header {
            text-align: center;
            font-weight: 700;
            padding: 10px 6px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: rgba(59, 130, 246, 0.15);
            color: var(--primary-blue-light);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .day-cell {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            min-height: 110px;
            padding: 10px 8px;
            border-radius: var(--radius-sm);
            position: relative;
            transition: border-color 0.2s, background 0.2s;
        }

        .day-cell:hover {
            border-color: rgba(59, 130, 246, 0.35);
            background: var(--glass-bg-light);
        }

        .day-cell.other-month {
            background: rgba(255,255,255,0.01);
            border-color: rgba(255,255,255,0.04);
            opacity: 0.4;
        }

        .day-cell.today {
            border: 2px solid var(--primary-blue);
            box-shadow: 0 0 16px rgba(59, 130, 246, 0.25);
        }

        .date-number {
            font-weight: 700;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .day-cell.today .date-number {
            color: var(--primary-blue-light);
        }

        .event-tag {
            display: block;
            font-size: 0.7rem;
            padding: 4px 6px;
            border-radius: 4px;
            margin-bottom: 3px;
            color: white;
            cursor: pointer;
            white-space: normal;
            line-height: 1.3;
            text-align: center;
            font-weight: 700;
            transition: transform 0.15s, opacity 0.15s;
        }

        .event-tag:hover { transform: scale(1.03); opacity: 0.9; }

        .tag-school {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark));
        }

        .tag-holiday {
            background: linear-gradient(135deg, var(--secondary-red), var(--secondary-red-dark));
        }

        .tag-noclass {
            background: linear-gradient(135deg, #475569, #334155);
        }

        .tag-event {
            background: linear-gradient(135deg, #F59E0B, #D97706);
        }

        /* Modal */
        .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .modal-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .members-list {
            list-style: none;
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }

        .members-list li {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            color: var(--text-secondary);
            padding: 8px 12px;
            background: var(--glass-bg);
            border-radius: var(--radius-sm);
            border: 1px solid var(--glass-border);
        }

        .members-list li::before {
            content: '●';
            color: var(--primary-blue-light);
            font-size: 0.5rem;
        }

        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo animate-up">
                <img src="img/logo.png" alt="Logo Comissão">
            </a>
            <nav class="nav-links animate-up">
                <a href="index.html">Início</a>
                <a href="calendar.html" class="active">Calendário</a>
                <a href="groups.html">Grupos</a>
                <a href="search.html">🔍 Pesquisar DI</a>
                <a href="admin.html" class="btn btn-primary"
                    style="padding: 8px 20px; font-size: 0.78rem;">Área ADM</a>
            </nav>
        </div>
    </header>

    <main class="container section">
        <div class="animate-up">
            <p style="font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--primary-blue-light); font-weight: 700; margin-bottom: 6px;">Visualização Mensal</p>
            <h1 style="margin-bottom: 32px;">Calendário de Vendas</h1>
        </div>

        <div class="calendar-controls animate-up" style="animation-delay: 0.1s;">
            <button class="btn btn-outline" id="prevMonth">‹ Anterior</button>
            <h2 id="currentMonthYear">Janeiro 2026</h2>
            <button class="btn btn-outline" id="nextMonth">Próximo ›</button>
        </div>

        <div class="calendar-grid animate-up" id="calendarGrid" style="animation-delay: 0.2s;">
            <!-- Headers -->
            <div class="day-header">Dom</div>
            <div class="day-header">Seg</div>
            <div class="day-header">Ter</div>
            <div class="day-header">Qua</div>
            <div class="day-header">Qui</div>
            <div class="day-header">Sex</div>
            <div class="day-header">Sáb</div>
            <!-- Days generated via JS -->
        </div>

        <div class="legend animate-up" style="animation-delay: 0.3s;">
            <div class="legend-item"><div class="legend-dot" style="background: var(--primary-blue);"></div> Dia de Venda</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--secondary-red);"></div> Feriado</div>
            <div class="legend-item"><div class="legend-dot" style="background: #475569;"></div> Sem Aula</div>
            <div class="legend-item"><div class="legend-dot" style="background: #F59E0B;"></div> Evento</div>
            <div class="legend-item"><div class="legend-dot" style="background: transparent; border: 2px solid var(--primary-blue);"></div> Hoje</div>
        </div>
    </main>

    <!-- Modal for details -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="modalCloseBtn">&times;</button>
            <div class="modal-header">
                <div class="modal-icon">👥</div>
                <div>
                    <p style="font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin: 0;" id="modalDate"></p>
                    <h3 id="modalTitle" style="margin: 4px 0 0;">Detalhes</h3>
                </div>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/scheduler.js"></script>
    <script>
        const grid = document.getElementById('calendarGrid');
        const monthLabel = document.getElementById('currentMonthYear');
        const modal = document.getElementById('detailsModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDate = document.getElementById('modalDate');
        const modalBody = document.getElementById('modalBody');
        const closeBtn = document.getElementById('modalCloseBtn');

        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let scheduleCache = {};

        async function init() {
            try {
                scheduleCache = await Scheduler.generateCalendar(currentYear, ALL_GROUPS);
                renderCalendar(currentMonth, currentYear);

                document.getElementById('prevMonth').onclick = () => changeMonth(-1);
                document.getElementById('nextMonth').onclick = () => changeMonth(1);
                closeBtn.onclick = () => modal.style.display = "none";
                window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
            } catch (e) {
                console.error('Erro ao inicializar calendário:', e);
            }
        }

        async function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
                scheduleCache = await Scheduler.generateCalendar(currentYear, ALL_GROUPS);
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
                scheduleCache = await Scheduler.generateCalendar(currentYear, ALL_GROUPS);
            }
            renderCalendar(currentMonth, currentYear);
        }

        function renderCalendar(month, year) {
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                                "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            monthLabel.textContent = `${monthNames[month]} ${year}`;

            // Clear days but keep the 7 headers
            while (grid.children.length > 7) {
                grid.removeChild(grid.lastChild);
            }

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

            // Padding
            for (let i = 0; i < firstDay; i++) {
                const d = document.createElement('div');
                d.className = 'day-cell other-month';
                grid.appendChild(d);
            }

            // Days
            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';

                const mm = String(month + 1).padStart(2, '0');
                const dd = String(d).padStart(2, '0');
                const dateStr = `${year}-${mm}-${dd}`;

                if (dateStr === todayStr) cell.classList.add('today');

                cell.innerHTML = `<span class="date-number">${d}</span>`;

                if (scheduleCache[dateStr]) {
                    const info = scheduleCache[dateStr];
                    if (info.type === 'AULA_NORMAL') {
                        info.groups.forEach(g => {
                            const tag = document.createElement('span');
                            tag.className = 'event-tag tag-school';
                            tag.textContent = `${g.turma} – G${g.number}`;
                            tag.title = `Clique para ver integrantes`;
                            tag.onclick = (e) => {
                                e.stopPropagation();
                                showGroupDetails(g, dateStr);
                            };
                            cell.appendChild(tag);
                        });
                    } else {
                        const tag = document.createElement('span');
                        const cls = info.type === 'FERIADO' ? 'tag-holiday'
                                    : info.type === 'EVENTO' ? 'tag-event' : 'tag-noclass';
                        tag.className = `event-tag ${cls}`;
                        tag.textContent = info.description || info.type.replace('_', ' ');
                        cell.appendChild(tag);
                    }
                }

                grid.appendChild(cell);
            }
        }

        function showGroupDetails(group, date) {
            const parts = date.split('-');
            modalDate.textContent = `📅 ${parts[2]}/${parts[1]}/${parts[0]}`;
            modalTitle.textContent = `${group.turma} — Grupo ${group.number}`;
            modalBody.innerHTML = `
                <p style="margin-bottom: 6px; color: var(--text-muted); font-size: 0.82rem;">Representante</p>
                <p style="font-weight: 700; color: var(--primary-blue-light); margin-bottom: 18px;">${group.representative}</p>
                <p style="color: var(--text-muted); font-size: 0.82rem; margin-bottom: 10px;">Integrantes</p>
                <ul class="members-list">
                    ${group.members.map(m => `<li>${m}</li>`).join('')}
                </ul>
            `;
            modal.style.display = "block";
        }

        init();
    </script>
</body>

</html>
