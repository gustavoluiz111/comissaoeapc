<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Comissão 3º Ano</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        .login-container {
            max-width: 440px;
            margin: 60px auto;
            padding: 40px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .admin-panel {
            display: none;
        }

        .controls-bar {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .calendar-admin-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .admin-day {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            min-height: 90px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .admin-day:hover {
            border-color: var(--primary-blue);
            background: var(--glass-bg-light);
        }

        .admin-day.selected {
            border: 2px solid var(--primary-blue-light);
            background: rgba(59, 130, 246, 0.15);
        }

        .status-badge {
            display: block;
            font-size: 0.7rem;
            padding: 4px;
            margin-top: 8px;
            border-radius: 4px;
            color: white;
            text-align: center;
            font-weight: 700;
        }

        .status-badge.bg-aula { background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark)); }
        .status-badge.bg-feriado { background: linear-gradient(135deg, var(--secondary-red), var(--secondary-red-dark)); }
        .status-badge.bg-semaula { background: linear-gradient(135deg, #475569, #334155); }
        .status-badge.bg-evento { background: linear-gradient(135deg, #F59E0B, #D97706); }
    </style>
</head>

<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo animate-up">
                <img src="img/logo.png" alt="Logo Comissão">
                <span>Painel ADM</span>
            </a>
            <nav class="nav-links animate-up">
                <a href="index.html">Voltar ao Site</a>
            </nav>
        </div>
    </header>

    <main class="container section">

        <!-- Login Section -->
        <div id="loginSection" class="glass-panel login-container animate-up">
            <h2 style="margin-bottom: 24px;">Acesso Restrito</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Entrar no Painel</button>
                <p id="loginError" style="color: var(--secondary-red); margin-top: 16px; display: none; font-weight: 600; font-size: 0.9rem;">Credenciais inválidas.</p>
            </form>
        </div>

        <!-- Dashboard Section -->
        <div id="adminPanel" class="admin-panel animate-up">
            <div class="controls-bar">
                <h3 style="margin: 0;">Gerenciar Calendário</h3>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <div id="connectionStatus" class="badge badge-gray">
                        Verificando...
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button class="btn btn-outline" style="padding: 8px 16px;" id="prevMonthAdmin">&lt;</button>
                        <span id="currentMonthYearAdmin" style="font-weight: 700; font-size: 1.1rem; min-width: 70px; text-align: center;"></span>
                        <button class="btn btn-outline" style="padding: 8px 16px;" id="nextMonthAdmin">&gt;</button>
                    </div>
                </div>
            </div>

            <p style="color: var(--text-secondary); margin-bottom: 20px;">Clique em um dia para alterar seu status (Feriado, Sem Aula, Evento).</p>

            <div class="calendar-admin-grid" id="adminCalendarGrid">
                <!-- Days generated by JS -->
            </div>

            <div class="controls-bar" style="margin-top: 32px; justify-content: flex-start; gap: 24px;">
                <h3 style="margin: 0;">Ações Globais</h3>
                <button onclick="if(confirm('Tem certeza? Isso limpará todas as configurações personalizadas de feriados.')) { State.reset(); location.reload(); }" class="btn btn-secondary" style="padding: 8px 24px;">Resetar Tudo</button>
            </div>
        </div>

    </main>

    <!-- Edit Day Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <button type="button" class="close-btn" onclick="closeEditModal()">&times;</button>
            <h3 style="margin-bottom: 24px;">Editar Dia <span id="editDateDisplay" style="color: var(--primary-blue-light);"></span></h3>
            <form id="editForm">
                <input type="hidden" id="editDateValue">

                <div class="form-group">
                    <label>Status do Dia</label>
                    <select id="editStatus">
                        <option value="AULA_NORMAL">Aula Normal (Com Vendas)</option>
                        <option value="SEM_AULA">Sem Aula (Sem Vendas)</option>
                        <option value="FERIADO">Feriado</option>
                        <option value="EVENTO">Evento Escolar</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Descrição Opcional</label>
                    <input type="text" id="editDescription" placeholder="Ex: Carnaval, Reunião Pedagógica...">
                </div>

                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px;">
                    <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Alteração</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/scheduler.js"></script>
    <script>
        // Auth Logic
        const loginSection = document.getElementById('loginSection');
        const adminPanel = document.getElementById('adminPanel');
        const loginForm = document.getElementById('loginForm');

        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            showAdmin();
        }

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if (u === 'napoliao' && p === 'eapc26eapc') {
                sessionStorage.setItem('admin_logged_in', 'true');
                showAdmin();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        };

        async function showAdmin() {
            loginSection.style.display = 'none';
            adminPanel.style.display = 'block';
            await State.init(); 

            // Update Connection Status UI
            const statusDiv = document.getElementById('connectionStatus');
            if (State.useFirebase) {
                statusDiv.innerText = "🟢 Online (Firebase)";
                statusDiv.className = "badge badge-green";
            } else {
                statusDiv.innerText = "🔴 Offline (Local)";
                statusDiv.className = "badge badge-red";
            }

            initAdminCalendar();
        }

        // Calendar Logic
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        const grid = document.getElementById('adminCalendarGrid');
        const monthLabel = document.getElementById('currentMonthYearAdmin');
        const editModal = document.getElementById('editModal');

        function initAdminCalendar() {
            renderAdminCalendar(currentMonth, currentYear);
            document.getElementById('prevMonthAdmin').onclick = () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
                renderAdminCalendar(currentMonth, currentYear);
            };
            document.getElementById('nextMonthAdmin').onclick = () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
                renderAdminCalendar(currentMonth, currentYear);
            };
        }

        function renderAdminCalendar(month, year) {
            monthLabel.textContent = `${String(month + 1).padStart(2, '0')}/${year}`;
            grid.innerHTML = '';

            const headers = ['D', 'S', 'T', 'Q', 'Q', 'S', 'S'];
            headers.forEach(h => {
                const head = document.createElement('div');
                head.style.fontWeight = '700';
                head.style.textAlign = 'center';
                head.style.padding = '8px 0';
                head.style.color = 'var(--primary-blue-light)';
                head.innerText = h;
                grid.appendChild(head);
            });

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.style.background = 'rgba(255,255,255,0.02)';
                empty.style.border = '1px solid rgba(255,255,255,0.05)';
                empty.style.borderRadius = 'var(--radius-sm)';
                grid.appendChild(empty);
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const cell = document.createElement('div');
                cell.className = 'admin-day';

                const mm = String(month + 1).padStart(2, '0');
                const dd = String(d).padStart(2, '0');
                const dateStr = `${year}-${mm}-${dd}`;

                const status = State.getDayStatus(dateStr);
                const dayOfWeek = new Date(year, month, d).getDay();

                let statusHtml = '';
                if (status.type === 'AULA_NORMAL') {
                    if (dayOfWeek === 0 || dayOfWeek === 6) {
                        cell.style.background = 'rgba(255,255,255,0.03)';
                        cell.style.color = 'var(--text-muted)';
                    } else {
                        statusHtml = '<span class="status-badge bg-aula">Aula</span>';
                    }
                } else {
                    let bgClass = 'bg-semaula';
                    if (status.type === 'FERIADO') bgClass = 'bg-feriado';
                    if (status.type === 'EVENTO') bgClass = 'bg-evento';
                    statusHtml = `<span class="status-badge ${bgClass}">${status.description || status.type}</span>`;
                }

                cell.innerHTML = `<strong style="font-size: 0.9rem;">${d}</strong>${statusHtml}`;
                cell.onclick = () => openEditModal(dateStr, status);

                grid.appendChild(cell);
            }
        }

        // Edit Logic
        function openEditModal(dateStr, currentStatus) {
            const parts = dateStr.split('-');
            document.getElementById('editDateDisplay').innerText = `${parts[2]}/${parts[1]}/${parts[0]}`;
            document.getElementById('editDateValue').value = dateStr;
            document.getElementById('editStatus').value = currentStatus.type;
            document.getElementById('editDescription').value = currentStatus.description || '';
            editModal.style.display = 'flex';
        }

        function closeEditModal() {
            editModal.style.display = 'none';
        }

        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const date = document.getElementById('editDateValue').value;
            const type = document.getElementById('editStatus').value;
            const desc = document.getElementById('editDescription').value;

            await State.setDayStatus(date, type, desc);
            closeEditModal();
            renderAdminCalendar(currentMonth, currentYear);
            
            const btn = document.querySelector('#editForm button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Salvo! ✔';
            btn.style.background = 'var(--accent-cyan)';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 1500);
        };

        window.onclick = (e) => { if (e.target == editModal) closeEditModal(); }

    </script>
</body>

</html>
